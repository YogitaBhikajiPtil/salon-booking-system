<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet"
        href="../assets/css/register.css">

</head>

<body>

    <div class="container">

        <form id="registerForm">

            <h2>Create Account</h2>

            <input
                type="text"
                id="name"
                placeholder="Full Name"
                required>

            <input
                type="email"
                id="email"
                placeholder="Email"
                required>

            <input
                type="password"
                id="password"
                placeholder="Password"
                required>

            <input
                type="text"
                id="phone"
                placeholder="Phone Number"
                required>

            <button type="submit">

                Register

            </button>

            <p>

                Already have an account?

                <a href="login.html">

                    Login

                </a>

            </p>

        </form>

    </div>

    <script src="../assets/js/api.js"></script>

    <script src="../assets/js/register.js"></script>

</body>

</html>
