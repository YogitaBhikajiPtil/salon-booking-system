<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet"
        href="../assets/css/login.css">

</head>

<body>

    <div class="container">

        <form id="loginForm">

            <h2>Customer Login</h2>

            <input
                type="email"
                id="email"
                placeholder="Enter Email"
                required>

            <input
                type="password"
                id="password"
                placeholder="Enter Password"
                required>

            <button type="submit">

                Login

            </button>

            <p>

                Don't have an account?

                <a href="register.html">

                    Register

                </a>

            </p>

        </form>

    </div>

    <script src="../assets/js/api.js"></script>

    <script src="../assets/js/auth.js"></script>

</body>

</html>
