<!DOCTYPE html>
<html>
<head>
    <title>Add Service</title>
    <link rel="stylesheet" href="/frontend/assets/css/add-service.css">
</head>
<body>

<h1>Add Service</h1>

<div class="container">
    <input id="name" placeholder="Service Name">
    <textarea id="desc" placeholder="Description"></textarea>
    <input id="price" placeholder="Price" type="number">
    <input id="duration" placeholder="Duration (min)" type="number">

    <button class="btn-success" onclick="addService()">
        Save
    </button>
</div>

<script src="/frontend/assets/js/add-service.js"></script>
</body>
</html>
